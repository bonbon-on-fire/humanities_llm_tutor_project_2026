<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humanities Tutor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2d3748;
    }

    header span {
      font-size: 0.8rem;
      color: #718096;
    }

    #btn-reset {
      background: none;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #4a5568;
      transition: background 0.15s;
    }
    #btn-reset:hover { background: #edf2f7; }

    .main {
      width: 100%;
      max-width: 780px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0 12px;
    }

    /* ---- Chat window ---- */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.55;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.tutor {
      background: #fff;
      border: 1px solid #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.student {
      background: #3b82f6;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg-label {
      font-size: 0.73rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 4px;
      color: #718096;
    }

    .msg.student + .msg-label,
    .msg-label { color: #718096; }

    .bubble-wrap { display: flex; flex-direction: column; }
    .bubble-wrap.right { align-items: flex-end; }
    .bubble-wrap.left  { align-items: flex-start; }

    /* ---- Typing indicator ---- */
    .typing {
      display: none;
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      padding: 10px 16px;
    }
    .typing span {
      display: inline-block;
      width: 7px; height: 7px;
      background: #a0aec0;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ---- Student bot buttons ---- */
    #student-btns {
      display: flex;
      gap: 8px;
      padding: 10px 0 8px;
      flex-wrap: wrap;
    }

    .btn-student {
      flex: 1;
      min-width: 140px;
      padding: 9px 12px;
      font-size: 0.82rem;
      font-weight: 500;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      color: #4a5568;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-student:hover:not(:disabled) { background: #edf2f7; border-color: #a0aec0; }
    .btn-student:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ---- Input row ---- */
    #input-row {
      display: flex;
      gap: 8px;
      padding: 10px 0 16px;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      font-size: 0.92rem;
      border: 1.5px solid #cbd5e0;
      border-radius: 10px;
      outline: none;
      resize: none;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: #3b82f6; }

    #btn-send {
      padding: 10px 20px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #btn-send:hover:not(:disabled) { background: #2563eb; }
    #btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- Error toast ---- */
    #toast {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #e53e3e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.88rem;
      z-index: 100;
    }

    /* ---- Empty state ---- */
    #empty-state {
      margin: auto;
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    #empty-state strong { display: block; font-size: 1.1rem; color: #718096; margin-bottom: 6px; }
  </style>
</head>
<body>

<header>
  <h1>🎓 Humanities Tutor</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <span id="status-label">Ready</span>
    <button id="btn-reset">New conversation</button>
  </div>
</header>

<div class="main">
  <div id="chat">
    <div id="empty-state">
      <strong>Welcome!</strong>
      Click <em>New conversation</em> to start,<br>
      or type your message below.
    </div>
    <div class="typing" id="typing-indicator">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div id="student-btns">
    {% for key, label in student_labels.items() %}
    <button class="btn-student" data-type="{{ key }}" disabled>{{ label }}</button>
    {% endfor %}
  </div>

  <div id="input-row">
    <textarea id="msg-input" rows="1" placeholder="Type your message…"></textarea>
    <button id="btn-send">Send</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const chatEl       = document.getElementById('chat');
  const typingEl     = document.getElementById('typing-indicator');
  const inputEl      = document.getElementById('msg-input');
  const sendBtn      = document.getElementById('btn-send');
  const resetBtn     = document.getElementById('btn-reset');
  const studentBtns  = document.querySelectorAll('.btn-student');
  const emptyState   = document.getElementById('empty-state');
  const statusLabel  = document.getElementById('status-label');
  const toast        = document.getElementById('toast');

  let busy = false;
  // Track what role sent the last message so we can enable/disable student buttons
  let lastRole = null;

  // ---------- Helpers ----------

  function setStatus(text) { statusLabel.textContent = text; }

  function showToast(msg) {
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3500);
  }

  function setBusy(state) {
    busy = state;
    sendBtn.disabled = state;
    resetBtn.disabled = state;
    inputEl.disabled = state;
    studentBtns.forEach(b => b.disabled = state || lastRole !== 'tutor');
    typingEl.style.display = state ? 'flex' : 'none';
    if (state) chatEl.scrollTop = chatEl.scrollHeight;
  }

  function updateStudentBtns() {
    studentBtns.forEach(b => b.disabled = busy || lastRole !== 'tutor');
  }

  function appendBubble(role, text, label) {
    if (emptyState) emptyState.remove();

    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role === 'tutor' ? 'left' : 'right'}`;

    const lbl = document.createElement('div');
    lbl.className = 'msg-label';
    lbl.textContent = label || (role === 'tutor' ? 'Tutor' : 'You');

    const bubble = document.createElement('div');
    bubble.className = `msg ${role}`;
    bubble.textContent = text;

    wrap.appendChild(lbl);
    wrap.appendChild(bubble);

    // Insert before typing indicator
    chatEl.insertBefore(wrap, typingEl);
    chatEl.scrollTop = chatEl.scrollHeight;

    lastRole = role;
    updateStudentBtns();
  }

  // ---------- API calls ----------

  async function apiPost(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Request failed.' }));
      throw new Error(err.error || 'Request failed.');
    }
    return res.json();
  }

  // ---------- Reset ----------

  resetBtn.addEventListener('click', async () => {
    if (busy) return;
    setBusy(true);
    setStatus('Starting new conversation…');

    // Clear chat visually
    chatEl.innerHTML = '';
    chatEl.appendChild(typingEl);
    lastRole = null;
    updateStudentBtns();

    try {
      const data = await apiPost('/reset', {});
      appendBubble('tutor', data.tutor);
      setStatus('Ready');
    } catch (e) {
      showToast(e.message);
      setStatus('Error');
    } finally {
      setBusy(false);
    }
  });

  // ---------- Send user message ----------

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || busy) return;
    inputEl.value = '';
    autoResize();

    setBusy(true);
    setStatus('Thinking…');
    appendBubble('student', text);

    try {
      const data = await apiPost('/chat', { message: text });
      appendBubble('tutor', data.tutor);
      setStatus('Ready');
    } catch (e) {
      showToast(e.message);
      setStatus('Error');
      // Remove the student bubble we optimistically added
    } finally {
      setBusy(false);
    }
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ---------- Student bot buttons ----------

  studentBtns.forEach(btn => {
    btn.addEventListener('click', async () => {
      if (busy || lastRole !== 'tutor') return;
      const type = btn.dataset.type;
      const label = btn.textContent.trim();

      setBusy(true);
      setStatus(`Generating ${label} message…`);

      try {
        const data = await apiPost(`/student/${type}`, {});
        appendBubble('student', data.student, label);
        appendBubble('tutor', data.tutor);
        setStatus('Ready');
      } catch (e) {
        showToast(e.message);
        setStatus('Error');
      } finally {
        setBusy(false);
      }
    });
  });

  // ---------- Auto-resize textarea ----------

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }
  inputEl.addEventListener('input', autoResize);
</script>
</body>
</html>
